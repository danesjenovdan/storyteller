{% load i18n %}
{% get_current_language as CURRENT_LANGUAGE %}
<!DOCTYPE html>
<html lang="{{ CURRENT_LANGUAGE|default:'sl' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% trans "Storyteller" %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="border-bottom bg-light">
        <nav class="container py-3 d-flex justify-content-between align-items-center">
            <a href="{% url 'video_list' %}" class="text-decoration-none fw-semibold">{% trans "Storyteller" %}</a>
            <form action="{% url 'set_language' %}" method="post" class="d-flex align-items-center gap-2">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.path }}">
                <label for="language-select" class="form-label mb-0">{% trans "Jezik" %}</label>
                <select id="language-select" name="language" class="form-select form-select-sm" onchange="this.form.submit()">
                    <option value="sl" {% if CURRENT_LANGUAGE|slice:":2" == 'sl' %}selected{% endif %}>Slovenščina</option>
                    <option value="en" {% if CURRENT_LANGUAGE|slice:":2" == 'en' %}selected{% endif %}>English</option>
                </select>
            </form>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
